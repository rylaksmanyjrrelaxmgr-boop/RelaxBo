services:
  - type: web
    name: relax-bot
    runtime: python
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: MAIN_ADMIN_ID
        sync: false
      - key: BOT_NAME
        value: ريلاكس مانيجر
      - key: BOT_USERNAME
        value: Reelaaaxbot
      - key: USE_PROXY
        value: false
      - key: NSFW_ENABLED
        value: true
      - key: NSFW_THRESHOLD
        value: 0.7
      - key: MAX_FILE_SIZE
        value: 20971520
      - key: MAX_BACKUPS
        value: 10
      - key: PYTHON_VERSION
        value: 3.11.0
